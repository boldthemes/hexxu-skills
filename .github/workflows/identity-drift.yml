# identity-drift.yml — enforces CLAUDE.md constraint #2
#
# Skills MUST NOT read worker identity from ad-hoc sources (git config, whoami,
# $USER, $LOGNAME). The single source is the HEXXU_WORKER_ID env var (constraint
# #7). This workflow greps every changed file under skills/** on any PR to main
# and fails if a forbidden pattern appears.
#
# Why this exists: constraint #2 is a habit, not a syntax error. Without a
# mechanical check, identity assumptions sneak in slowly and become months of
# cleanup work during a future SSO migration. The check is ~30 lines of YAML and
# pays for itself the first time it catches one accidental commit.
#
# CEO-plan reference: D5.1 (identity drift CI check); Risk #3 mitigation;
# constraint #2 in CLAUDE.md.

name: identity-drift

on:
  pull_request:
    branches: [main]
    paths:
      # T13.11: also fire on changes to the workflow itself so a PR that
      # weakens the regex set triggers the meta-check job below.
      - 'skills/**'
      - '.github/workflows/identity-drift.yml'

jobs:
  check:
    name: identity-drift check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Need history so we can diff against the PR base
          fetch-depth: 0

      - name: Compute changed skill files
        id: changed
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "Diffing $BASE_SHA..$HEAD_SHA under skills/**"

          # Use null-delimited output and read into an array to handle any path
          # safely (spaces, quotes, etc.). Then re-emit as a newline-delimited
          # multiline GITHUB_OUTPUT block.
          # T13.16: --diff-filter=AMR catches renames too. A rename without
          # modification to a file that already contained a forbidden pattern
          # otherwise slips through.
          mapfile -d '' CHANGED < <(git diff -z --name-only --diff-filter=AMR \
            "$BASE_SHA" "$HEAD_SHA" -- 'skills/**' || true)

          {
            echo "files<<__EOF__"
            for f in "${CHANGED[@]}"; do
              [ -n "$f" ] && printf '%s\n' "$f"
            done
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

          echo "Changed skill files (${#CHANGED[@]}):"
          for f in "${CHANGED[@]}"; do
            [ -n "$f" ] && echo "  $f"
          done

      # T13.3: pass the step output via env: instead of inline ${{ }} templating
      # into a bash heredoc. The heredoc approach pasted the file list as
      # literal script text; a malicious filename containing the heredoc
      # terminator would have prematurely closed it. env: keeps the data
      # path through env vars, not through script-text interpolation.
      - name: Scan changed files for forbidden identity sources
        env:
          FILES: ${{ steps.changed.outputs.files }}
        run: |
          set -uo pipefail

          if [ -z "$(printf '%s' "$FILES" | tr -d '[:space:]')" ]; then
            echo "No skill files added or modified in this PR; skipping."
            exit 0
          fi

          # Forbidden identity sources. Each is an ERE pattern.
          # Add CLAUDE.md/docs/ to allowlist below if you need to mention them
          # in documentation (currently we don't have any in skills/**).
          declare -A FORBIDDEN=(
            ['git config user\.']="Use HEXXU_WORKER_ID instead of git config (constraint #2)"
            ['\bwhoami\b']="Use HEXXU_WORKER_ID instead of whoami (constraint #2)"
            ['\$USER\b']="Use HEXXU_WORKER_ID instead of \$USER (constraint #2)"
            ['\$LOGNAME\b']="Use HEXXU_WORKER_ID instead of \$LOGNAME (constraint #2)"
            ['\$EUID\b']="Use HEXXU_WORKER_ID instead of \$EUID (constraint #2)"
          )

          FAILED=0
          # Use process substitution + while-read so FAILED isn't lost to subshell
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [ ! -f "$file" ]; then
              echo "::warning::Listed file not present in PR head: $file"
              continue
            fi
            for pattern in "${!FORBIDDEN[@]}"; do
              guidance="${FORBIDDEN[$pattern]}"
              # T13.15: grep -iE so case variants (`$User`, `Whoami`, etc.) get caught too.
              # Skills are unlikely to have a legitimate `$User` reference, but if one shows
              # up, an inline exception is easier than missing the violation entirely.
              if matches=$(grep -niE "$pattern" "$file" 2>/dev/null); then
                while IFS= read -r line; do
                  lineno="${line%%:*}"
                  content="${line#*:}"
                  # GitHub Actions annotation lands in PR diff view
                  printf '::error file=%s,line=%s::Identity drift: %s\n' \
                    "$file" "$lineno" "$guidance"
                  printf '  %s:%s  %s\n' "$file" "$lineno" "$content"
                done <<< "$matches"
                FAILED=1
              fi
            done
          done <<< "$FILES"

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "=========================================================="
            echo "identity-drift check FAILED"
            echo "=========================================================="
            echo "Skills MUST NOT read worker identity from ad-hoc sources."
            echo "Use the HEXXU_WORKER_ID env var (constraint #7)."
            echo "See CLAUDE.md constraint #2 for the full rationale."
            exit 1
          fi

          echo "All changed skill files pass the identity-drift check."

  # T13.11: meta-check. Always runs alongside the main check. On PRs that
  # only modify skill files, it's a quick no-op confirming the workflow
  # itself is still valid. On PRs that modify the workflow, it verifies
  # the essential FORBIDDEN patterns are still present so a weakening
  # change (intentional or accidental) is caught at the CI gate.
  meta-check:
    name: identity-drift meta-check
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Verify essential patterns still present
        run: |
          set -e
          file=.github/workflows/identity-drift.yml
          missing=()
          for pattern in 'whoami' 'git config user' '\$USER' '\$LOGNAME' '\$EUID'; do
            if ! grep -qF "$pattern" "$file"; then
              missing+=("$pattern")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::identity-drift workflow is missing essential patterns: ${missing[*]}"
            echo "These patterns must remain in the FORBIDDEN map. Removing them silently"
            echo "weakens constraint #2 enforcement."
            exit 1
          fi
          echo "All essential identity-drift patterns are still present."
